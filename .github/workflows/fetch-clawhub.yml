name: Fetch ClawHub Skills

on:
  schedule:
    - cron: '0 2 * * *'   # 每天 UTC 02:00
  workflow_dispatch:       # 支持手动触发

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch skills from ClawHub API
        run: node scripts/fetch-clawhub.mjs

      - name: Commit & push if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/clawhub-skills.json
          git diff --staged --quiet || (git commit -m "chore: 更新 ClawHub 技能数据" && git push)
